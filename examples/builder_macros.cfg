# ===============================
# macro-builder: builder_macros.cfg
# ===============================
# Include this file at the TOP of your printer.cfg:
#     [include builder_macros.cfg]
#
# What you get:
# - Two visible macros to RUN the builders and SHOW the summaries:
#     * BUILDER_KLIPPER_BUILD / BUILDER_KLIPPER_SHOW
#     * BUILDER_KATAPULT_BUILD / BUILDER_KATAPULT_SHOW
# - Two shell backends to actually flash via CAN/USB:
#     * FLASH_CAN  (gcode_shell_command)    ← not shown as a button
#     * FLASH_USB  (gcode_shell_command)    ← not shown as a button
# - Two Jinja2 wrapper macros with error handling:
#     * FLASH_CAN_BOARD UUID=<uuid> BIN=<path/to/klipper.bin>
#     * FLASH_USB_BOARD SERIAL=<serial-id> BIN=<path/to/klipper.bin>
#
# The builders will print suggested commands either as:
#   - SSH commands, or
#   - RUN_SHELL_COMMAND lines using the backends above (if you set "flash terminal: gcode_shell")

# --- Flash backends (hidden from UI: they are gcode_shell_command) ---

# --- Builder: KLIPPER ---
[gcode_shell_command BUILDER_KLIPPER_RUN] # SSH manual method: ~/macro-builder/build_klipper.sh
command: bash -lc '${HOME}/macro-builder/build_klipper.sh'
timeout: 6000
verbose: True

[gcode_shell_command BUILDER_KLIPPER_SHOW] # SSH manual method: test -f ~/printer_data/system/builder_klipper_last.txt && cat ~/printer_data/system/builder_klipper_last.txt
command: bash -lc 'test -f ${HOME}/printer_data/system/builder_klipper_last.txt && cat ${HOME}/printer_data/system/builder_klipper_last.txt'
timeout: 20
verbose: True

[gcode_macro BUILD_KLIPPER]
description: Build Klipper and show the summary
gcode:
  RUN_SHELL_COMMAND CMD=BUILDER_KLIPPER_RUN
  RUN_SHELL_COMMAND CMD=BUILDER_KLIPPER_SHOW

# Optional
#[gcode_macro SHOW_LAST_KLIPPER_BUILD]
#description: Show last klipper build
#gcode:
#  RUN_SHELL_COMMAND CMD=BUILDER_KLIPPER_SHOW


# --- Builder: KATAPULT ---
[gcode_shell_command BUILDER_KATAPULT_RUN] # SSH manual method: ~/macro-builder/build_katapult.sh
command: bash -lc '${HOME}/macro-builder/build_katapult.sh'
timeout: 6000
verbose: True

[gcode_shell_command BUILDER_KATAPULT_UPDATE_SHOW] # SSH manual method: test -f ~/printer_data/system/builder_katapult_update.txt && cat ~/printer_data/system/builder_katapult_update.txt
command: bash -lc 'test -f ${HOME}/printer_data/system/builder_katapult_update.txt && cat ${HOME}/printer_data/system/builder_katapult_update.txt'
timeout: 20
verbose: True

[gcode_shell_command BUILDER_KATAPULT_INSTALL_SHOW] # SSH manual method: test -f ~/printer_data/system/builder_katapult_install.txt && cat ~/printer_data/system/builder_katapult_install.txt
command: bash -lc 'test -f ${HOME}/printer_data/system/builder_katapult_install.txt && cat ${HOME}/printer_data/system/builder_katapult_install.txt'
timeout: 20
verbose: True


[gcode_macro BUILD_KATAPULT]
description: Build Katapult and show the summary
gcode:
  RUN_SHELL_COMMAND CMD=BUILDER_KATAPULT_RUN
  RUN_SHELL_COMMAND CMD=BUILDER_KATAPULT_UPDATE_SHOW
  RUN_SHELL_COMMAND CMD=BUILDER_KATAPULT_FRESH_SHOW

# Optional
#[gcode_macro SHOW_LAST_KATAPULT_BUILD]
#description: Show last katapult build
#gcode:
#  RUN_SHELL_COMMAND CMD=BUILDER_KATAPULT_UPDATE_SHOW
#  RUN_SHELL_COMMAND CMD=BUILDER_KATAPULT_FRESH_SHOW


# --- Reccommaned to not make button macros ---
# FLASH_CAN: Flashes a board already running Katapult over CAN bus.
#   Usage from another macro: RUN_SHELL_COMMAND CMD=FLASH_CAN PARAMS="-i can0 -u <uuid> -f <path/to/klipper.bin>"
#   Usage from console:       RUN_SHELL_COMMAND CMD=FLASH_CAN PARAMS="-i can0 -u <uuid> -f <path/to/klipper.bin>"
[gcode_shell_command FLASH_CAN]
command: bash -lc 'python3 ${HOME}/katapult/scripts/flashtool.py {params}'
timeout: 180
verbose: True

# FLASH_USB: Flashes a board already running Katapult over USB serial.
#   Usage from another macro: RUN_SHELL_COMMAND CMD=FLASH_USB PARAMS="-d /dev/serial/by-id/<id> -f <path/to/klipper.bin>"
#   Usage from console:       RUN_SHELL_COMMAND CMD=FLASH_USB PARAMS="-d /dev/serial/by-id/<id> -f <path/to/klipper.bin>"
[gcode_shell_command FLASH_USB]
command: bash -lc 'python3 ${HOME}/katapult/scripts/flashtool.py {params}'
timeout: 180
verbose: True


# --- Fresh Katapult Install via USB (first-time flash, bypasses CAN) ---

[gcode_shell_command KATAPULT_FRESH_INSTALL_RUN]
# SSH manual method: ~/macro-builder/build_katapult.sh --fresh-usb
# Flashes Katapult over USB to a board that has never had Katapult installed.
# The board must be in DFU / bootloader mode before running this command.
command: bash -lc 'python3 ${HOME}/katapult/scripts/flashtool.py -d /dev/serial/by-id/{params}'
timeout: 300
verbose: True

[gcode_macro FRESH_KATAPULT_INSTALL]
description: Flash Katapult for the first time via USB (board must be in DFU/bootloader mode)
gcode:
  {% set serial_id = params.SERIAL_ID | default("") %}
  {% if serial_id == "" %}
    { action_respond_info("ERROR: Provide the USB serial ID with SERIAL_ID=<id>") }
    { action_respond_info("Tip: run 'ls /dev/serial/by-id/' or 'sudo dfu-util -l' in SSH to find the ID") }
  {% else %}
    RUN_SHELL_COMMAND CMD=KATAPULT_FRESH_INSTALL_RUN PARAMS="{serial_id}"
    RUN_SHELL_COMMAND CMD=KATAPULT_FRESH_INSTALL_SHOW
  {% endif %}


# ==============================================================================
# --- LAYER 2: Jinja2 Wrapper Macros ---
# ==============================================================================
# These macros wrap the raw shell commands above with parameter validation and
# a clean calling interface. Use these instead of calling FLASH_CAN / FLASH_USB
# directly.
#
# Usage examples (from console or another macro):
#   FLASH_CAN_BOARD UUID=1a2b3c4d5e6f BIN=~/printer_data/config/macro-builder/artifacts/klipper/ebb.bin
#   FLASH_USB_BOARD SERIAL=usb-Klipper_stm32g0b1xx_... BIN=~/printer_data/config/macro-builder/artifacts/klipper/mcu.bin
# ==============================================================================

# FLASH_CAN_BOARD: Flashes a board over CAN bus using Katapult's flashtool.
#   Required parameters:
#     UUID  – CAN UUID of the target board (e.g. 1a2b3c4d5e6f)
#     BIN   – Full path to the .bin firmware file (e.g. ~/printer_data/config/macro-builder/artifacts/klipper/ebb.bin)
[gcode_macro _FLASH_CAN_BOARD]
description: Flash a board over CAN bus via Katapult. Requires UUID=<uuid> BIN=<path/to/firmware.bin>
gcode:
  {% set uuid = params.UUID | default("") | trim %}
  {% set bin  = params.BIN  | default("") | trim %}

  {% if uuid == "" %}
    { action_respond_info("!! FLASH_CAN_BOARD ERROR: Missing parameter UUID.") }
    { action_respond_info("   Usage: FLASH_CAN_BOARD UUID=<can-uuid> BIN=<path/to/firmware.bin>") }
    { action_respond_info("   Tip: run 'python3 ~/katapult/scripts/flashtool.py -i can0 -q' in SSH to list UUIDs.") }
  {% elif bin == "" %}
    { action_respond_info("!! FLASH_CAN_BOARD ERROR: Missing parameter BIN.") }
    { action_respond_info("   Usage: FLASH_CAN_BOARD UUID=<can-uuid> BIN=<path/to/firmware.bin>") }
  {% else %}
    {% set flash_params = "-i can0 -u " ~ uuid ~ " -f " ~ bin %}
    { action_respond_info(">> FLASH_CAN_BOARD: Flashing UUID=" ~ uuid ~ " with " ~ bin) }
    RUN_SHELL_COMMAND CMD=FLASH_CAN PARAMS="{ flash_params }"
  {% endif %}

# FLASH_USB_BOARD: Flashes a board over USB serial using Katapult's flashtool.
#   Required parameters:
#     SERIAL – USB serial ID of the target board (the part after /dev/serial/by-id/)
#     BIN    – Full path to the .bin firmware file (e.g. ~/printer_data/config/macro-builder/artifacts/klipper/mcu.bin)
[gcode_macro _FLASH_USB_BOARD]
description: Flash a board over USB serial via Katapult. Requires SERIAL=<serial-id> BIN=<path/to/firmware.bin>
gcode:
  {% set serial = params.SERIAL | default("") | trim %}
  {% set bin    = params.BIN    | default("") | trim %}

  {% if serial == "" %}
    { action_respond_info("!! FLASH_USB_BOARD ERROR: Missing parameter SERIAL.") }
    { action_respond_info("   Usage: FLASH_USB_BOARD SERIAL=<serial-id> BIN=<path/to/firmware.bin>") }
    { action_respond_info("   Tip: run 'ls /dev/serial/by-id/' in SSH to list serial IDs.") }
  {% elif bin == "" %}
    { action_respond_info("!! FLASH_USB_BOARD ERROR: Missing parameter BIN.") }
    { action_respond_info("   Usage: FLASH_USB_BOARD SERIAL=<serial-id> BIN=<path/to/firmware.bin>") }
  {% else %}
    {% set flash_params = "-d /dev/serial/by-id/" ~ serial ~ " -f " ~ bin %}
    { action_respond_info(">> FLASH_USB_BOARD: Flashing /dev/serial/by-id/" ~ serial ~ " with " ~ bin) }
    RUN_SHELL_COMMAND CMD=FLASH_USB PARAMS="{ flash_params }"
  {% endif %}

